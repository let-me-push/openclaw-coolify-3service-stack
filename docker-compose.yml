name: openclaw-coolify-3service

services:
  browser:
    image: browserless/chrome:latest
    container_name: browser
    restart: unless-stopped
    environment:
      TOKEN: ${BROWSER_TOKEN}
      PREBOOT_CHROME: "true"
      CONCURRENT: ${BROWSER_CONCURRENT:-5}
      QUEUED: ${BROWSER_QUEUED:-10}
      TIMEOUT: ${BROWSER_TIMEOUT_MS:-120000}
      ENABLE_CORS: "true"
      CORS_ALLOW_ORIGIN: "*"
      TZ: ${TZ:-UTC}
    shm_size: 1gb
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/json/version?token='+encodeURIComponent(process.env.TOKEN||'')).then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s

  openclaw:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: openclaw
    restart: unless-stopped
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      TZ: ${TZ:-UTC}
    volumes:
      - ./data/openclaw:/home/node/.openclaw
      - ./config/openclaw.json:/home/node/.openclaw/openclaw.json
      - ./:/home/node/.openclaw/workspace/stack
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789"
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      browser:
        condition: service_healthy

  code-server:
    image: lscr.io/linuxserver/code-server:latest
    container_name: code-server
    restart: unless-stopped
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-UTC}
      PASSWORD: ${CODE_SERVER_PASSWORD}
      SUDO_PASSWORD: ${CODE_SERVER_SUDO_PASSWORD:-}
      DEFAULT_WORKSPACE: /config/workspace
    volumes:
      - ./data/code-server:/config
      - ./:/config/workspace
    ports:
      - "${CODE_SERVER_PORT:-8443}:8443"
    depends_on:
      openclaw:
        condition: service_started
