name: openclaw-coolify-3service

services:
  browser:
    image: browserless/chrome:latest
    restart: unless-stopped
    environment:
      TOKEN: ${BROWSER_TOKEN:?}
      PREBOOT_CHROME: "true"
      CONCURRENT: ${BROWSER_CONCURRENT:-5}
      QUEUED: ${BROWSER_QUEUED:-10}
      TIMEOUT: ${BROWSER_TIMEOUT_MS:-120000}
      ENABLE_CORS: "true"
      CORS_ALLOW_ORIGIN: "*"
      TZ: ${TZ:-UTC}
      SERVICE_FQDN_BROWSER_3000: https://${BROWSER_DOMAIN}
    shm_size: 1gb

  openclaw:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    restart: unless-stopped
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:?}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENCLAW_CONFIG_PATH: /tmp/openclaw.json
      OPENCLAW_DOMAIN: ${OPENCLAW_DOMAIN:?}
      TZ: ${TZ:-UTC}
      SERVICE_FQDN_OPENCLAW_18789: https://${OPENCLAW_DOMAIN}
    volumes:
      - ./data/openclaw:/home/node/.openclaw
      - ./:/home/node/.openclaw/workspace/stack
    extra_hosts:
      - "host.docker.internal:host-gateway"
    init: true
    command:
      [
        "sh",
        "-lc",
        "node <<'NODE'\nconst fs = require('node:fs');\nconst env = process.env;\nfor (const key of ['OPENCLAW_GATEWAY_TOKEN', 'BROWSER_TOKEN', 'OPENCLAW_DOMAIN']) {\n  if (!env[key]) {\n    console.error('Missing required env var: ' + key);\n    process.exit(1);\n  }\n}\nconst adminTelegram = env.TELEGRAM_ADMIN_ID ? ['tg:' + env.TELEGRAM_ADMIN_ID] : [];\nconst config = {\n  gateway: {\n    mode: 'local',\n    auth: { mode: 'token', token: env.OPENCLAW_GATEWAY_TOKEN },\n    bind: 'lan',\n    controlUi: {\n      allowedOrigins: ['http://localhost:18789', 'http://127.0.0.1:18789', 'https://' + env.OPENCLAW_DOMAIN],\n    },\n  },\n  tools: {\n    profile: 'coding',\n    elevated: { enabled: true, allowFrom: { webchat: ['*'], telegram: adminTelegram } },\n    exec: { notifyOnExit: true },\n  },\n  browser: {\n    enabled: true,\n    defaultProfile: 'browserless',\n    ssrfPolicy: { dangerouslyAllowPrivateNetwork: true },\n    remoteCdpTimeoutMs: 7000,\n    remoteCdpHandshakeTimeoutMs: 12000,\n    profiles: { browserless: { cdpUrl: 'ws://browser:3000?token=' + env.BROWSER_TOKEN, attachOnly: true, color: '#00AA00' } },\n  },\n  agents: {\n    defaults: { thinkingDefault: 'medium' },\n    list: [{ id: 'main', name: 'Main', default: true, tools: { elevated: { enabled: true, allowFrom: { webchat: ['*'], telegram: adminTelegram } } } }],\n  },\n};\nif (env.TELEGRAM_BOT_TOKEN && env.TELEGRAM_ADMIN_ID) {\n  config.channels = {\n    telegram: {\n      enabled: true,\n      botToken: env.TELEGRAM_BOT_TOKEN,\n      dmPolicy: 'allowlist',\n      allowFrom: adminTelegram,\n      replyToMode: 'first',\n      actions: { reactions: true, sendMessage: true },\n    },\n  };\n}\nfs.writeFileSync('/tmp/openclaw.json', JSON.stringify(config, null, 2) + '\\n', { mode: 0o600 });\nconsole.log('Wrote /tmp/openclaw.json');\nNODE\nexec node dist/index.js gateway --bind lan --port 18789"
      ]
    depends_on:
      - browser

  code-server:
    image: lscr.io/linuxserver/code-server:latest
    restart: unless-stopped
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-UTC}
      PASSWORD: ${CODE_SERVER_PASSWORD:?}
      SUDO_PASSWORD: ${CODE_SERVER_SUDO_PASSWORD:-}
      DEFAULT_WORKSPACE: /config/workspace
      SERVICE_FQDN_CODE-SERVER_8443: https://${CODE_DOMAIN}
    volumes:
      - ./data/code-server:/config
      - ./:/config/workspace
    depends_on:
      - openclaw
